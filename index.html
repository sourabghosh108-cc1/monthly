<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Monthly Budget Calculator</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
       <h1>Monthly Budget Calculator</h1>
       <form id="budgetForm">
           <label>Monthly Income:</label>
           <input type="number" id="income" required>

           <h3>Fixed Expenses</h3>
           <label>Rent:</label>
           <input type="number" id="rent" required>
           <label>Utilities:</label>
           <input type="number" id="utilities" required>
           <label>Insurance:</label>
           <input type="number" id="insurance" required>

           <h3>Variable Expenses</h3>
           <label>Number of Variable Expenses:</label>
           <input type="number" id="numVar" min="0" value="0" required>
           <div id="varExpensesContainer"></div>

           <button type="submit">Calculate Budget</button>
       </form>

       <div id="result"></div>
   </div>

   <script src="script.js"></script>
</body>
</html>
